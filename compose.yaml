services:
  weight-path:
    build: .
    env_file: .env
    environment:
      PORT: 3000
    ports:
      - "${WEBAPP_PORT:-8080}:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
